<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReddyAnna Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#8b0015;
}

.header{
    background:black;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img{
    height:28px;
    width:auto;
}

.header-buttons a{
    text-decoration:none;
    color:white;
    background:#444444;
    border:1px solid white;
    box-shadow:0 0 0 1px #ff4d6d;
    padding:5px 14px;
    border-radius:8px;
    margin-left:6px;
    font-size:15px;
    font-weight:700;
    letter-spacing:1px;
}

.login-box{
    background:#1f5d93;
    margin:25px 15px;
    padding:25px 20px;
    border-radius:15px;
    color:white;
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
    font-size:22px;
    font-weight:700;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#174a78;
    color:white;
    font-size:14px;
}

.remember{
    font-size:14px;
    margin-bottom:10px;
}

.forgot{
    text-align:center;
    margin-bottom:8px;
}

.forgot a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
}

.btn-white{
    background:#e5e5e5;
    color:black;
}

.whatsapp-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#f0c14b;
    color:black;
    font-weight:bold;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    margin-top:10px;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:white;
}

/* 🔥 Error Notification */
.error-box{
    display:none;
    background:#ff4d4d;
    color:white;
    padding:10px;
    border-radius:8px;
    text-align:center;
    margin-bottom:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="reddybook.png" alt="Logo">
    </div>
    <div class="header-buttons">
        <!-- SIGNUP WhatsApp -->
        <a href="https://wa.me/918744988148?text=Hello%20new%20id%20chaiye" target="_blank">SIGNUP</a>

        <!-- LOGIN Refresh -->
        <a href="#" onclick="location.reload()">LOGIN</a>
    </div>
</div>

<div class="login-box">
    <h2>LOGIN NOW</h2>

    <div class="input-box">
        <input type="text" placeholder="USERNAME / MOBILE NUMBER">
    </div>

    <div class="input-box">
        <input type="password" placeholder="PASSWORD">
    </div>

    <div class="remember">
        <input type="checkbox"> Remember Me?
    </div>

    <!-- Forgot WhatsApp -->
    <div class="forgot">
        <a href="https://wa.me/918744988148?text=forgot%20my%20password" target="_blank">
            Forgot Password/Username?
        </a>
    </div>

    <!-- Error Box -->
    <div class="error-box" id="errorBox">
        ❌ Invalid Username or Password
    </div>

    <!-- White Login Button -->
    <button class="btn btn-white" onclick="showError()">LOG IN</button>

    <button class="btn btn-white" style="margin-top:10px;">LOGIN WITH DEMO ID</button>

    <!-- Yellow WhatsApp -->
    <a href="https://wa.me/918744988148?text=Hello%20new%20id" target="_blank" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i> WHATSAPP NOW
    </a>

    <div class="footer">
        Powered by ReddyAnna <br>
        reddyanna.clubofficial@gmail.com
    </div>
</div>

<script>
function showError(){
    var box = document.getElementById("errorBox");
    box.style.display = "block";
    setTimeout(function(){
        box.style.display = "none";
    }, 1000);
}
</script>

</body>
</html>
