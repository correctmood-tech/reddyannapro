<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReddyAnna Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#8b0015;
}

/* 🔥 Black Header Thoda Bada */
.header{
    background:black;
    padding:10px 15px;   /* Pehle 5px tha, ab thoda bada */
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img{
    height:28px;
    width:auto;
    display:block;
}

.header-buttons a{
    text-decoration:none;
    color:white;
    background:#444444;
    border:1px solid white;
    box-shadow:0 0 0 2px #ff4d6d;
    padding:5px 14px;
    border-radius:8px;
    margin-left:6px;
    font-size:15px;
    font-weight:700;
    letter-spacing:1px;
}

.login-box{
    background:#1f5d93;
    margin:25px 15px;
    padding:25px 20px;
    border-radius:15px;
    color:white;
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
    font-size:22px;
    font-weight:700;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#174a78;
    color:white;
    font-size:14px;
}

.options{
    font-size:14px;
    margin-bottom:15px;
}

.options a{
    color:white;
    text-decoration:none;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    font-size:15px;
    margin-top:10px;
    cursor:pointer;
}

.btn-white{
    background:#e5e5e5;
    color:black;
}

.whatsapp-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#f0c14b;
    color:black;
    font-weight:bold;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    margin-top:10px;
}

.whatsapp-btn i{
    font-size:20px;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="reddybook.png" alt="Reddy Book Logo">
    </div>
    <div class="header-buttons">
        <a href="#">SIGNUP</a>
        <a href="#">LOGIN</a>
    </div>
</div>

<div class="login-box">
    <h2>LOGIN NOW</h2>

    <div class="input-box">
        <input type="text" placeholder="USERNAME / MOBILE NUMBER">
    </div>

    <div class="input-box">
        <input type="password" placeholder="PASSWORD">
    </div>

    <div class="options">
        <input type="checkbox"> Remember Me?<br><br>
        <a href="#">Forgot Password/Username?</a>
    </div>

    <button class="btn btn-white">LOG IN</button>
    <button class="btn btn-white">LOGIN WITH DEMO ID</button>

    <a href="#" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i> WHATSAPP NOW
    </a>

    <div class="footer">
        Powered by ReddyAnna <br>
        reddyanna.clubofficial@gmail.com
    </div>
</div>

</body>
</html>
